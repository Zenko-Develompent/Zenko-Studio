spring.application.name=edu-platform

server.port=${BACKEND_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/edu_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

app.security.master-key-b64=${MASTER_KEY_B64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
app.security.access-ttl-sec=${ACCESS_TTL_SEC:900}
app.security.refresh-ttl-days=${REFRESH_TTL_DAYS:30}
app.security.session-ttl-sec=${WEB_SESSION_TTL_SEC:86400}
app.security.login-rate-limit-max=${RL_LOGIN_MAX:8}
app.security.login-rate-limit-window-ms=${RL_LOGIN_WINMS:300000}
app.security.cookies.secure=${COOKIES_SECURE:false}
app.security.cookies.domain=${COOKIES_DOMAIN:}
app.security.cors.allow-all=${CORS_ALLOW_ALL:true}
app.content.lessons-root=${LESSON_CONTENT_ROOT:}
app.code-runner.enabled=${CODE_RUNNER_ENABLED:true}
app.code-runner.docker-command=${CODE_RUNNER_DOCKER_COMMAND:docker}
app.code-runner.workspace-root=${CODE_RUNNER_WORKSPACE_ROOT:}
app.code-runner.timeout-ms=${CODE_RUNNER_TIMEOUT_MS:5000}
app.code-runner.memory-mb=${CODE_RUNNER_MEMORY_MB:128}
app.code-runner.cpus=${CODE_RUNNER_CPUS:0.5}
app.code-runner.pids-limit=${CODE_RUNNER_PIDS_LIMIT:64}
app.code-runner.max-code-length=${CODE_RUNNER_MAX_CODE_LENGTH:20000}
app.code-runner.max-input-length=${CODE_RUNNER_MAX_INPUT_LENGTH:4000}
app.code-runner.max-output-length=${CODE_RUNNER_MAX_OUTPUT_LENGTH:20000}

app.chat.ws-endpoint=${CHAT_WS_ENDPOINT:/ws/social}
app.chat.ws-allowed-origin-patterns=${CHAT_WS_ALLOWED_ORIGINS:*}
app.chat.broker-destination-prefixes=${CHAT_WS_BROKER_PREFIXES:/topic,/queue}
app.chat.application-destination-prefix=${CHAT_WS_APP_PREFIX:/app}
app.chat.user-destination-prefix=${CHAT_WS_USER_PREFIX:/user}
app.chat.user-chat-destination=${CHAT_WS_USER_CHAT_DESTINATION:/queue/social/chat}
app.chat.user-friend-destination=${CHAT_WS_USER_FRIEND_DESTINATION:/queue/social/friends}
app.chat.user-parent-control-destination=${CHAT_WS_USER_PARENT_CONTROL_DESTINATION:/queue/social/parent-control}
app.chat.chats-default-limit=${CHAT_CHATS_DEFAULT_LIMIT:20}
app.chat.chats-max-limit=${CHAT_CHATS_MAX_LIMIT:100}
app.chat.messages-default-limit=${CHAT_MESSAGES_DEFAULT_LIMIT:50}
app.chat.messages-max-limit=${CHAT_MESSAGES_MAX_LIMIT:200}
app.chat.friend-requests-default-limit=${CHAT_FRIEND_REQUESTS_DEFAULT_LIMIT:20}
app.chat.friend-requests-max-limit=${CHAT_FRIEND_REQUESTS_MAX_LIMIT:50}
app.chat.friends-default-limit=${CHAT_FRIENDS_DEFAULT_LIMIT:50}
app.chat.friends-max-limit=${CHAT_FRIENDS_MAX_LIMIT:200}
app.chat.user-search-default-limit=${CHAT_USER_SEARCH_DEFAULT_LIMIT:20}
app.chat.user-search-max-limit=${CHAT_USER_SEARCH_MAX_LIMIT:50}
app.chat.user-search-min-query-length=${CHAT_USER_SEARCH_MIN_QUERY_LENGTH:2}
app.chat.user-search-max-query-length=${CHAT_USER_SEARCH_MAX_QUERY_LENGTH:100}

app.seed.enabled=${SEED_ENABLED:false}
app.seed.only-if-empty=${SEED_ONLY_IF_EMPTY:true}
app.seed.admin.username=${SEED_ADMIN_USERNAME:admin}
app.seed.admin.password=${SEED_ADMIN_PASSWORD:Admin1234}
app.seed.admin.age=${SEED_ADMIN_AGE:30}
app.seed.course.name=${SEED_COURSE_NAME:Demo Course}
app.seed.course.description=${SEED_COURSE_DESCRIPTION:Seeded course}
app.seed.course.category=${SEED_COURSE_CATEGORY:demo}
app.seed.course.module-name=${SEED_MODULE_NAME:Demo Module}
