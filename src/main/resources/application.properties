spring.application.name=edu-platform

server.port=${BACKEND_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/edu_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

app.security.master-key-b64=${MASTER_KEY_B64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
app.security.access-ttl-sec=${ACCESS_TTL_SEC:900}
app.security.refresh-ttl-days=${REFRESH_TTL_DAYS:30}
app.security.session-ttl-sec=${WEB_SESSION_TTL_SEC:86400}
app.security.login-rate-limit-max=${RL_LOGIN_MAX:8}
app.security.login-rate-limit-window-ms=${RL_LOGIN_WINMS:300000}
app.security.cookies.secure=${COOKIES_SECURE:false}
app.security.cookies.domain=${COOKIES_DOMAIN:}
app.security.cors.allow-all=${CORS_ALLOW_ALL:true}
app.content.lessons-root=${LESSON_CONTENT_ROOT:}
