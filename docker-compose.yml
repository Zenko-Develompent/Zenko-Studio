services:
  backend:
    build: .
    container_name: edu-backend
    ports:
      - "${BACKEND_PORT}:8080"
    env_file:
      - .env
    environment:
      LESSON_CONTENT_ROOT: /data/lessons
      CODE_RUNNER_WORKSPACE_ROOT: ${CODE_RUNNER_WORKSPACE_ROOT:-/var/lib/edu-runner-work}
    volumes:
      - ${LESSON_CONTENT_HOST_PATH:-./lesson-content}:/data/lessons:rw
      - ${CODE_RUNNER_WORKSPACE_HOST_PATH:-/var/lib/edu-runner-work}:${CODE_RUNNER_WORKSPACE_ROOT:-/var/lib/edu-runner-work}:rw
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    depends_on:
      - edu-db
    networks:
      - edu-network

  edu-db:
    image: postgres:15
    container_name: edu-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - edu-network

volumes:
  pgdata:

networks:
  edu-network:
    driver: bridge
